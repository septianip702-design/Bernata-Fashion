<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BERNATA FASHION | Formulir Bayar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">Bernata<span>Fashion</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1 gap-lg-3 mt-2 mt-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="tentang.html">Tentang</a></li>
                    <li class="nav-item"><a class="nav-link" href="katalog.html">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link active" href="bayar.html">Bayar</a></li>
                    <li class="nav-item"><a class="nav-link" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container py-3" style="max-width: 580px;">
            <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm">
                <h3 class="fw-bold text-center mb-4">Pemesanan</h3>
                <form id="formBayar" onsubmit="prosesPembayaran(event)">
                    <div class="mb-3">
                        <label for="nama" class="form-label small fw-semibold">Nama Penerima</label>
                        <input type="text" class="form-control" id="nama" placeholder="Masukkan nama lengkap" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-semibold">Alamat Email</label>
                        <input type="email" class="form-control" id="email" placeholder="contoh@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="alamat" class="form-label small fw-semibold">Alamat Pengiriman</label>
                        <textarea class="form-control" id="alamat" rows="3" placeholder="Tulis alamat rumah lengkap" required></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="metode" class="form-label small fw-semibold">Metode Transaksi</label>
                        <select class="form-select" id="metode" required>
                            <option value="" disabled selected>Pilih Opsi Pembayaran...</option>
                            <option value="qris">E-Wallet (OVO, DANA, QRIS)</option>
                            <option value="va">Virtual Account Bank</option>
                            <option value="cod">Bayar di Tempat (COD)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-custom w-100 py-2.5 fw-semibold mt-2">Selesaikan Pesanan</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-center py-4 mt-5">
        <div class="container">
            <p class="mb-1 fw-medium" style="font-size: 0.9rem; letter-spacing: 1px;">BERNATA FASHION</p>
            <p class="mb-0 text-muted small">&copy; 2026 Bernata Fashion. Semua Hak Dilindungi.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
